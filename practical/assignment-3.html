<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=20
        let b=5

        //arithmetic operators
        document.write('<br>Addition ='+(a+b))
        document.write('<br> Subtraction ='+(a-b))
        document.write('<br>Multiplication ='+(a*b))
        document.write('<br>Division ='+(a/b))


        // Comparison Operators
        document.write('<br>Equal ='+(a==b))
        document.write('<br>Greater ='+(a>b))

        //Logical Operators
        document.write('<br>condition ='+(a>10&& b<5))
        
        
        


        
    </script>
</body>
</html>
