<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Day of Week using switch</title>
</head>
<body>
    <script>
        let day=7
        switch(day){
            case 1:day
                document.write('<br>Monday')
                break
            case 2:day
                document.write('<br>Tuesday')
                break
            case 3:day
                document.write('<br>Wednesday')
                break
            case 4:day
                document.write('<br>Thursday')
                break
            case 5:day
                document.write('<br>Friday')
                break
            case 6:day
                document.write('<br>Saturday')
                break
            case 7:day
                document.write('<br>Sunday')
                break
            default:
                document.write('<br>Invalid Input')
                    
        }
    </script>
</body>
</html>
