<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Positive, Negative, or Zero using if-else</title>
</head>
<body>
    <script>
        let num=0

        if(num>0){
            document.write('<br>Positive Number')
            
        } else if(num<0){
            document.write('<br>Negative Number')
            
        } else{
            document.write('<br> Zero')
            
        }
    </script>
</body>
</html>
