<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum all even numbers between 1 and 20 using while loop</title>
</head>
<body>
    <script>
        let i=2
        let sum=0

        while(i<=20){
            sum=sum+i
            i=i+2
            
        }

        document.write('<br>Sum is '+sum)
        
    </script>
</body>
</html>
