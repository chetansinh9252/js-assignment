<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>do-while loop for user input until number is greater than 10</title>
</head>
<body>
    <script>
        let num
        do{
            num=Number(prompt("Enter a number greater than 10:"))
        } while(num<=10)

        document.write('<br>You entered: '+num)
        
    </script>
</body>
</html>
