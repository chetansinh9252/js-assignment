<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculateSum Function</title>
</head>
<body>
    <script>
        function calculateSum(a,b){
            return a+b
        }

        let result =calculateSum(10,5)
        document.write('<br>Sum = '+result)
        
    </script>
</body>
